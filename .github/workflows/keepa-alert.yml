name: Keepa Alert

on:
  schedule:
    # 北京时间 10:00 和 18:00 (UTC 02:00, 10:00)
    - cron: '0 2,10 * * *'
  
  workflow_dispatch:  # 手动触发

jobs:
  send-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: pip install requests keepa
      
    - name: Run alert
      env:
        KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
      run: python scripts/send_alert_from_cache.py --targets scripts/alert_targets.json --label "巴西竞手ASIN预警"
